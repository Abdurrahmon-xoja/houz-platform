<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Ho.uz — Mebel do'konlari ro'yxati. Kategoriya bo'yicha filtrlash va do'kon ma'lumotlarini ko'rish.">
    <title>Do'konlar | Ho.uz</title>
    <link rel="stylesheet" href="css/style.css?v=3.1">
</head>

<body>

    <!-- Header -->
    <header class="site-header">
        <div class="header-inner">
            <a href="index.html" class="home-logo">
                <span class="logo-text-top">TOP</span><span class="logo-text-in">IN</span>
            </a>

            <!-- Language Switcher -->
            <div id="langWrap" style="position:relative;">
                <button class="lang-switch-btn" id="langBtn" aria-label="Change Language">
                    <svg class="lang-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="2" y1="12" x2="22" y2="12"></line>
                        <path
                            d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z">
                        </path>
                    </svg>
                    <span class="lang-text">UZ</span>
                    <svg class="lang-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="6 9 12 15 18 9"></polyline>
                    </svg>
                </button>
                <div class="lang-dropdown" id="langDropdown">
                    <div class="lang-option selected" data-lang="uz">
                        O'zbek <span class="lang-check">✓</span>
                    </div>
                    <div class="lang-option" data-lang="ru">
                        Русский <span class="lang-check">✓</span>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="page-wrapper" style="max-width: 900px; margin: 0 auto;">
        <!-- Category tags -->
        <div class="markets-categories-wrap">
            <div class="markets-categories" id="catTabs">
                <!-- Injected via JS -->
            </div>
        </div>

        <!-- Toolbar -->
        <div class="markets-toolbar">
            <div class="markets-count" id="shopCount" style="font-weight: 500;">0</div>
        </div>

        <!-- Shops Grid -->
        <div class="shops-wrap">
            <div class="shops-grid" id="shopsGrid">
                <div class="loader" id="shopLoader"></div>
            </div>
        </div>

    </main>

    <!-- Footer -->
    <footer class="site-footer">
        © 2026 <a href="https://ho.uz">Ho.uz Architects</a> · Mebel do'konlari bazasi · Toshkent, O'zbekiston
    </footer>

    <!-- Shop Detail Modal -->
    <div class="modal-overlay" id="shopModal" style="display:none;" role="dialog" aria-modal="true">
        <div class="modal-sheet" id="modalSheet">
            <button class="modal-close" id="modalClose" aria-label="Yopish">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>

            <div class="modal-content-grid">
                <!-- Left/Top Section: Logo & Info -->
                <div class="modal-info-col">
                    <div class="modal-logo" id="modalLogo">🏪</div>
                    <h2 class="modal-shop-name" id="modalName">–</h2>
                    <p class="modal-shop-desc" id="modalDescFull">Bu do'kon haqida ma'lumot...</p>

                    <div class="modal-shop-loc" id="modalLoc">
                        <img src="img/icons/Location icon.svg" alt="Location" class="modal-loc-icon">
                        <span id="modalLocText">–</span>
                    </div>
                </div>

                <!-- Right/Bottom Section: Links & Contacts -->
                <div class="modal-links-col">
                    <div class="modal-rows" id="modalRows"></div>
                </div>
            </div>

            <!-- Bottom Buttons -->
            <div class="modal-btns">
                <button class="btn-modal-share" id="modalShareBtn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path>
                        <polyline points="16 6 12 2 8 6"></polyline>
                        <line x1="12" y1="2" x2="12" y2="15"></line>
                    </svg>
                    Ulashish
                </button>
                <button class="btn-modal-primary" id="modalDirectionsBtn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="3 11 22 2 13 21 11 13 3 11"></polygon>
                    </svg>
                    Yo'nalish
                </button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script src="js/config.js?v=3.1"></script>
    <script src="js/utils.js?v=3.1"></script>
    <script src="js/market.js?v=3.1"></script>
    <script src="js/modal.js?v=3.1"></script>
</body>

</html>
